<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header>
        <h1>User Registration</h1>
    </header>

    <nav>
        <a href="./index.html">Home</a>
        <a href="./register.html">Register</a>
        <a href="./login.html">Login</a>
    </nav>

    <div class="container">
        <form method="POST" action="./register.html">
            <label>Full Name</label>
            <input type="text" name="fullname" required>

            <label>National ID Number</label>
            <input type="text" name="national_id_number" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Phone Number</label>
            <input type="text" name="phone" required>

            <label>Driving License Number</label>
            <input type="text" name="driving_license_number" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <label>Preferred Car Type</label>
            <select name="preferred_car_type" required>
                <option value="">Select Car Type</option>
                <option value="Economy">Economy</option>
                <option value="SUV">SUV</option>
                <option value="Truck">Truck</option>
            </select>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" name="register">Register</button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="./login.html">Login</a>
        </p>
    </div>

    <footer>
        &copy; 2026 Car Soko Rental Services
    </footer>
</body>
</html>
